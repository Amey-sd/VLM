model_name_or_path: Qwen/Qwen2-VL-2B-Instruct
data_path: ./training_data.json
image_folder: ./data/processed
output_dir: ./output_qwen_lora

# Training Hyperparameters
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 2e-4
weight_decay: 0.01
warmup_ratio: 0.03
max_seq_length: 2048

# LoRA Configuration
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Qwen Specifics
frames_per_clip: 4
vision_resolution: 224

# Hardware settings
bf16: false
fp16: true  
gradient_checkpointing: true
dataloader_num_workers: 3
logging_steps: 5
save_strategy: "steps"
save_steps: 50
save_total_limit: 2
report_to: "none"